
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#28936b">
<link rel="apple-touch-icon" href="ICON.png">
<title>Consignment App</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Archivo',sans-serif;}

body{
margin:0;
background-image:url("background.png");
background-size:cover;
background-repeat:repeat;
background-position:center;
color:#143d2f;
transition:.25s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:#72c18f;
font-weight:600;
}

nav{
display:flex;
gap:10px;
padding:10px;
}

nav button{
flex:1;
background:#28936b;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

.container{
padding:16px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:14px;
font-size:16px;
}

label{
display:block;
margin-top:10px;
margin-bottom:8px;
font-weight:500;
}

button{
border:none;
padding:14px;
border-radius:12px;
font-size:16px;
}

.primaryBtn{
background:#28936b;
color:white;
width:100%;
}

/* calculator result */

.resultCard{
background:#dff3df;
border-radius:12px;
padding:16px;
margin-top:16px;
}

.personBlock{
margin-bottom:14px;
}

.personTitle{
font-weight:600;
color:#1c5c43;
margin-bottom:8px;
}

.totalCommission{
margin-top:12px;
padding-top:12px;
border-top:1px solid rgba(0,0,0,0.1);
font-weight:600;
}

/* consignor list */

.consignorRow{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.consignorBtn{
flex:1;
background:#62a977;
color:white;
}

.deleteConsignorBtn{
background:#e74c3c;
color:white;
padding:10px 14px;
border-radius:10px;
width:auto;
}

.emptyState{
background:#dff3df;
padding:30px;
border-radius:12px;
text-align:center;
margin-bottom:16px;
font-weight:500;
}

/* sales */

.sale{
display:flex;
align-items:center;
padding:10px 0;
border-bottom:1px solid rgba(0,0,0,0.08);
}

.saleLeft{
flex:1;
}

.saleAmount{
font-weight:600;
margin-right:8px;
}

.deleteBtn{
background:#e74c3c;
border:none;
border-radius:8px;
padding:8px;
display:flex;
align-items:center;
justify-content:center;
width:auto;
flex:0 0 auto;
}

.deleteBtn svg{
fill:white;
width:18px;
height:18px;
}

.totalBox{
margin-top:14px;
padding:14px;
border-radius:10px;
background:#b1e8b2;
font-weight:600;
}

.refreshBtn{
background:#8B8B8B;
color:white;
margin-top:18px;
width:100%;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>
<div>Twinleaf Consignments 🍃</div>
</header>

<nav class="container">
<button onclick="showPage('calculator')">Calculator</button>
<button onclick="showPage('log')">Revenue Log</button>
</nav>

<div class="container">

<!-- CALCULATOR -->

<div id="calculator" class="card">

<label>Total Revenue</label>
<input id="revenue">

<label>Jone %</label>
<input id="p1" value="3">

<label>Angelo %</label>
<input id="p2" value="3">

<label>Ginny %</label>
<input id="p3" value="3">

<button class="primaryBtn" onclick="calculate()">Calculate</button>

<div id="results" class="resultCard hidden"></div>

</div>

<!-- REVENUE LOG -->

<div id="log" class="card hidden">

<div id="consignorList"></div>

<button class="primaryBtn" onclick="addConsignor()">+ Add Consignor 🍃</button>

<button class="refreshBtn" onclick="confirmReset()">Refresh / New Day</button>

</div>

<!-- CONSIGNOR PAGE -->

<div id="consignorPage" class="card hidden">

<button onclick="backToList()">← Back</button>

<h3 id="consignorTitle"></h3>

<label>Card Name</label>
<input id="saleLabel">

<label>Sale Revenue</label>
<input id="saleAmount">

<button class="primaryBtn" onclick="addSale()">Add Sale</button>

<div id="salesList"></div>

<div id="totalRevenue" class="totalBox">
Total Revenue: $0
</div>

</div>

</div>

<script>

function showPage(page){
document.getElementById("calculator").classList.add("hidden")
document.getElementById("log").classList.add("hidden")
document.getElementById("consignorPage").classList.add("hidden")
document.getElementById(page).classList.remove("hidden")
}

/* CALCULATOR */

function calculate(){

let revenue=parseFloat(document.getElementById("revenue").value)||0
let p1=parseFloat(document.getElementById("p1").value)||0
let p2=parseFloat(document.getElementById("p2").value)||0
let p3=parseFloat(document.getElementById("p3").value)||0

let r1=revenue*(p1/100)
let r2=revenue*(p2/100)
let r3=revenue*(p3/100)

let total=r1+r2+r3

let html=`
<div class="personBlock">
<div class="personTitle">Person 1</div>
Revenue Share: $${r1.toFixed(2)}
</div>

<div class="personBlock">
<div class="personTitle">Person 2</div>
Revenue Share: $${r2.toFixed(2)}
</div>

<div class="personBlock">
<div class="personTitle">Person 3</div>
Revenue Share: $${r3.toFixed(2)}
</div>

<div class="totalCommission">
Total Commission Distributed: $${total.toFixed(2)}
</div>
`

let results=document.getElementById("results")
results.innerHTML=html
results.classList.remove("hidden")

}

/* REVENUE LOG */

let activeConsignor=null

function getConsignors(){
return JSON.parse(localStorage.getItem("consignors")||"[]")
}

function saveConsignors(data){
localStorage.setItem("consignors",JSON.stringify(data))
}

function renderConsignorList(){

let consignors=getConsignors()
let list=document.getElementById("consignorList")
list.innerHTML=""

if(consignors.length===0){
list.innerHTML='<div class="emptyState">No consignors yet</div>'
return
}

consignors.forEach((c,i)=>{

list.innerHTML+=`
<div class="consignorRow">

<button class="consignorBtn" onclick="openConsignor(${i})">
${c.name}
</button>

<button class="deleteConsignorBtn" onclick="deleteConsignor(${i})">
Delete
</button>

</div>
`

})

}

function addConsignor(){

let consignors=getConsignors()

if(consignors.length>=5){
alert("Maximum 5 consignors")
return
}

let name=prompt("Consignor name")
if(!name) return

consignors.push({name:name,sales:[]})

saveConsignors(consignors)
renderConsignorList()

}

function deleteConsignor(index){

if(!confirm("Delete this consignor and all their sales?")) return

let consignors=getConsignors()
consignors.splice(index,1)

saveConsignors(consignors)
renderConsignorList()

}

function openConsignor(index){

activeConsignor=index

let consignors=getConsignors()
document.getElementById("consignorTitle").innerText=consignors[index].name

renderSales()

document.getElementById("log").classList.add("hidden")
document.getElementById("consignorPage").classList.remove("hidden")

}

function backToList(){

document.getElementById("consignorPage").classList.add("hidden")
document.getElementById("log").classList.remove("hidden")

renderConsignorList()

}

function renderSales(){

let consignors=getConsignors()
let sales=consignors[activeConsignor].sales

let list=document.getElementById("salesList")
let total=0

list.innerHTML=""

sales.forEach((s,i)=>{

total+=Number(s.amount)

list.innerHTML+=`
<div class="sale">

<div class="saleLeft">${s.label}</div>

<div class="saleAmount">$${s.amount}</div>

<button class="deleteBtn" onclick="deleteSale(${i})">
<svg viewBox="0 0 24 24">
<path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z"/>
</svg>
</button>

</div>
`
})

document.getElementById("totalRevenue").innerText="Total Revenue: $"+total.toFixed(2)

}

function addSale(){

let label=document.getElementById("saleLabel").value
let amount=parseFloat(document.getElementById("saleAmount").value)

if(!amount) return

let consignors=getConsignors()

consignors[activeConsignor].sales.push({
label:label||"Card Sale",
amount:amount
})

saveConsignors(consignors)

document.getElementById("saleLabel").value=""
document.getElementById("saleAmount").value=""

renderSales()

}

function deleteSale(index){

let consignors=getConsignors()
consignors[activeConsignor].sales.splice(index,1)

saveConsignors(consignors)
renderSales()

}

function confirmReset(){

if(confirm("Start a new day? This will delete all consignors and sales.")){
localStorage.removeItem("consignors")
renderConsignorList()
}

}

renderConsignorList()

</script>

</body>
</html>
