
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#FF4081">

<title>Consignment App</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Archivo',sans-serif;
}

body{
margin:0;
background:#fde6ef;
color:#333;
transition:0.25s;
}

.dark{
background:#121212;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
background:#f8bbd0;
font-weight:600;
}

/* toggle */

.switch{
position:relative;
display:inline-block;
width:46px;
height:26px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.3s;
border-radius:26px;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
transition:.3s;
border-radius:50%;
}

input:checked + .slider{
background:#FF4081;
}

input:checked + .slider:before{
transform:translateX(20px);
}

/* nav */

nav{
display:flex;
gap:10px;
padding:10px;
}

nav button{
flex:1;
background:#FF4082;
color:#FFFFFF;
border:none;
padding:10px;
border-radius:10px;
}

/* layout */

.container{
padding:16px;
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:18px;
}

.dark .card{
background:#1e1e1e;
}

.logCard{
background:#f9d0dc;
}

.dark .logCard{
background:#242424;
}

/* inputs */

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:12px;
font-size:16px;
background:white;
}

/* buttons */

button{
border:none;
padding:14px;
border-radius:10px;
font-size:16px;
width:100%;
}

.calculateBtn{
background:#FF4082;
color:white;
}

.addSaleBtn{
background:#FF4082;
color:white;
}

.resetBtn{
background:#FFFCF7;
color:#333;
margin-top:20px;
}

/* result */

.result{
background:#fce4ec;
padding:14px;
border-radius:10px;
margin-top:12px;
}

.dark .result{
background:#2a2a2a;
}

.hidden{
display:none;
}

/* sale list */

.sale{
padding:10px;
border-bottom:1px solid rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

.saleLabel{
font-weight:500;
}

.saleAmount{
color:#555;
}

.total{
font-weight:600;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div>💰 Consignment</div>

<label class="switch">
<input type="checkbox" onchange="toggleDark()">
<span class="slider"></span>
</label>

</header>

<nav class="container">
<button onclick="showPage('calculator')">Calculator</button>
<button onclick="showPage('log')">Revenue Log</button>
</nav>

<div class="container">

<div id="calculator" class="card">

<label>Total Revenue</label>
<input id="revenue">

<label>Commission %</label>
<input id="commission">

<label>Number of People</label>
<input id="peopleCount" value="3" onchange="generatePeople()">

<div id="peopleInputs"></div>

<button class="calculateBtn" onclick="calculate()">Calculate</button>

<div id="results" class="result"></div>

</div>

<div id="log" class="card logCard hidden">

<label>Card Name</label>
<input id="saleLabel" placeholder="e.g. Charizard EX">

<label>Sale Revenue</label>
<input id="saleAmount">

<button class="addSaleBtn" onclick="addSale()">Add Sale</button>

<div id="salesList"></div>

<div class="total">
Total Revenue Today: $<span id="dailyTotal">0</span>
</div>

<button class="resetBtn" onclick="confirmReset()">🔄 Refresh / New Day</button>

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
}

function showPage(page){
document.getElementById("calculator").classList.add("hidden")
document.getElementById("log").classList.add("hidden")
document.getElementById(page).classList.remove("hidden")
}

function generatePeople(){
let count=document.getElementById("peopleCount").value
let container=document.getElementById("peopleInputs")
container.innerHTML=""
for(let i=1;i<=count;i++){
container.innerHTML+=`
<label>Person ${i} %</label>
<input id="p${i}">
`
}
}
generatePeople()

function calculate(){

let revenue=parseFloat(document.getElementById("revenue").value)||0
let count=document.getElementById("peopleCount").value
let output=""

for(let i=1;i<=count;i++){

let percent=parseFloat(document.getElementById("p"+i).value)||0

let commission=revenue*(percent/100)
let revenueShare=revenue*(percent/100)

output+=`
<b>Person ${i}</b><br>
Commission: $${commission.toFixed(2)}<br>
Revenue Share: $${revenueShare.toFixed(2)}<br><br>
`
}

document.getElementById("results").innerHTML=output

}

function loadSales(){

let sales=JSON.parse(localStorage.getItem("sales")||"[]")

// auto-fix old data
if(typeof sales[0] === "string"){
localStorage.removeItem("sales")
sales=[]
}

let list=document.getElementById("salesList")
let total=0

list.innerHTML=""

sales.forEach((s)=>{

let label=s.label || "Sale"
let amount=Number(s.amount)

if(isNaN(amount)) amount=0

total+=amount

list.innerHTML+=`
<div class="sale">
<div class="saleLabel">${label}</div>
<div class="saleAmount">$${amount}</div>
</div>
`

})

document.getElementById("dailyTotal").innerText=total.toFixed(2)

}

function addSale(){

let label=document.getElementById("saleLabel").value.trim()
let amount=parseFloat(document.getElementById("saleAmount").value)

if(!amount || amount<=0) return

let sales=JSON.parse(localStorage.getItem("sales")||"[]")

sales.push({
label: label || "Pokemon Card Sale",
amount: amount
})

localStorage.setItem("sales",JSON.stringify(sales))

document.getElementById("saleLabel").value=""
document.getElementById("saleAmount").value=""

loadSales()

}

function confirmReset(){

if(confirm("Start a new day? This will delete all logged sales.")){
localStorage.removeItem("sales")
loadSales()
}

}

loadSales()

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js')
}

</script>

</body>
</html>
